<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">APTS reader path flowchart</title>
  <desc id="desc">A role-based navigation flow for OWASP APTS showing where vendors, internal teams, procurement leaders, reviewers, and contributors should start.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <style><![CDATA[
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .node-title { font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .node-body { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .doc { font: 700 12px "SFMono-Regular", Consolas, "Liberation Mono", monospace; fill: #1E293B; }
      .card { filter: url(#shadow); }
      .line { stroke: #64748B; stroke-width: 2.2; marker-end: url(#arrow); }
      .lane-line { stroke: #CBD5E1; stroke-width: 2; }
    ]]></style>
  </defs>

  <rect width="1200" height="720" rx="28" fill="url(#bg)"/>
  <path d="M40 96H1160M40 188H1160M40 280H1160M40 372H1160M40 464H1160M40 556H1160M40 648H1160" stroke="#E2E8F0" stroke-width="1"/>
  <path d="M120 40V680M320 40V680M520 40V680M720 40V680M920 40V680M1120 40V680" stroke="#E2E8F0" stroke-width="1"/>

  <text x="600" y="58" text-anchor="middle" class="title">Choose Your APTS Path</text>
  <text x="600" y="86" text-anchor="middle" class="subtitle">Start with the documents that match your role, then collect the right evidence or contribution path.</text>

  <!-- Orientation cards -->
  <g class="card">
    <rect x="285" y="116" width="260" height="82" rx="18" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="415" y="148" text-anchor="middle" class="node-title">1. Get oriented</text>
    <text x="415" y="171" text-anchor="middle" class="node-body">Read the framework basics</text>
    <text x="415" y="190" text-anchor="middle" class="doc">Introduction + Glossary</text>
  </g>
  <g class="card">
    <rect x="655" y="116" width="260" height="82" rx="18" fill="#F8FAFC" stroke="#64748B" stroke-width="2"/>
    <text x="785" y="148" text-anchor="middle" class="node-title">2. Choose a role</text>
    <text x="785" y="171" text-anchor="middle" class="node-body">Follow the shortest path</text>
    <text x="785" y="190" text-anchor="middle" class="doc">Builder • Buyer • Reviewer</text>
  </g>
  <line x1="545" y1="157" x2="650" y2="157" class="line"/>

  <!-- Split line -->
  <path d="M785 198 V246 H148 M785 246 H376 M785 246 H604 M785 246 H832 M785 246 H1060" class="lane-line"/>
  <line x1="148" y1="246" x2="148" y2="271" class="line"/>
  <line x1="376" y1="246" x2="376" y2="271" class="line"/>
  <line x1="604" y1="246" x2="604" y2="271" class="line"/>
  <line x1="832" y1="246" x2="832" y2="271" class="line"/>
  <line x1="1060" y1="246" x2="1060" y2="271" class="line"/>

  <!-- Role cards -->
  <g class="card">
    <rect x="48" y="276" width="200" height="330" rx="20" fill="#ECFDF5" stroke="#059669" stroke-width="2.5"/>
    <circle cx="148" cy="316" r="24" fill="#A7F3D0" stroke="#059669" stroke-width="2"/>
    <text x="148" y="323" text-anchor="middle" class="node-title">Build</text>
    <text x="148" y="364" text-anchor="middle" class="node-title">Vendor / Platform</text>
    <text x="148" y="385" text-anchor="middle" class="node-title">Builder</text>
    <text x="148" y="424" text-anchor="middle" class="node-body">Pick target tier</text>
    <text x="148" y="448" text-anchor="middle" class="doc">Checklists</text>
    <text x="148" y="484" text-anchor="middle" class="node-body">Implement controls</text>
    <text x="148" y="508" text-anchor="middle" class="doc">Domain READMEs</text>
    <text x="148" y="544" text-anchor="middle" class="node-body">Document conformance</text>
    <text x="148" y="568" text-anchor="middle" class="doc">Claim Template</text>
  </g>

  <g class="card">
    <rect x="276" y="276" width="200" height="330" rx="20" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
    <circle cx="376" cy="316" r="24" fill="#DDD6FE" stroke="#7C3AED" stroke-width="2"/>
    <text x="376" y="323" text-anchor="middle" class="node-title">Run</text>
    <text x="376" y="364" text-anchor="middle" class="node-title">Enterprise</text>
    <text x="376" y="385" text-anchor="middle" class="node-title">Internal Team</text>
    <text x="376" y="424" text-anchor="middle" class="node-body">Define scope + autonomy</text>
    <text x="376" y="448" text-anchor="middle" class="doc">Getting Started</text>
    <text x="376" y="484" text-anchor="middle" class="node-body">Start with core domains</text>
    <text x="376" y="508" text-anchor="middle" class="doc">SE • SC • HO • AR</text>
    <text x="376" y="544" text-anchor="middle" class="node-body">Assemble evidence</text>
    <text x="376" y="568" text-anchor="middle" class="doc">Templates</text>
  </g>

  <g class="card">
    <rect x="504" y="276" width="200" height="330" rx="20" fill="#FFFBEB" stroke="#D97706" stroke-width="2.5"/>
    <circle cx="604" cy="316" r="24" fill="#FDE68A" stroke="#D97706" stroke-width="2"/>
    <text x="604" y="323" text-anchor="middle" class="node-title">Buy</text>
    <text x="604" y="364" text-anchor="middle" class="node-title">CISO /</text>
    <text x="604" y="385" text-anchor="middle" class="node-title">Procurement</text>
    <text x="604" y="424" text-anchor="middle" class="node-body">Evaluate operators</text>
    <text x="604" y="448" text-anchor="middle" class="doc">Vendor Guide</text>
    <text x="604" y="484" text-anchor="middle" class="node-body">Request artifacts</text>
    <text x="604" y="508" text-anchor="middle" class="doc">Evidence Checklist</text>
    <text x="604" y="544" text-anchor="middle" class="node-body">Review claims</text>
    <text x="604" y="568" text-anchor="middle" class="doc">Conformance Claim</text>
  </g>

  <g class="card">
    <rect x="732" y="276" width="200" height="330" rx="20" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.5"/>
    <circle cx="832" cy="316" r="24" fill="#FECDD3" stroke="#E11D48" stroke-width="2"/>
    <text x="832" y="323" text-anchor="middle" class="node-title">Verify</text>
    <text x="832" y="364" text-anchor="middle" class="node-title">Security Reviewer</text>
    <text x="832" y="385" text-anchor="middle" class="node-title">/ Auditor</text>
    <text x="832" y="424" text-anchor="middle" class="node-body">Confirm claimed tier</text>
    <text x="832" y="448" text-anchor="middle" class="doc">Checklists</text>
    <text x="832" y="484" text-anchor="middle" class="node-body">Review procedures</text>
    <text x="832" y="508" text-anchor="middle" class="doc">Verification sections</text>
    <text x="832" y="544" text-anchor="middle" class="node-body">Test behavior</text>
    <text x="832" y="568" text-anchor="middle" class="doc">Acceptance Testing</text>
  </g>

  <g class="card">
    <rect x="960" y="276" width="200" height="330" rx="20" fill="#F8FAFC" stroke="#475569" stroke-width="2.5"/>
    <circle cx="1060" cy="316" r="24" fill="#E2E8F0" stroke="#475569" stroke-width="2"/>
    <text x="1060" y="323" text-anchor="middle" class="node-title">Help</text>
    <text x="1060" y="364" text-anchor="middle" class="node-title">Contributor</text>
    <text x="1060" y="424" text-anchor="middle" class="node-body">Read project rules</text>
    <text x="1060" y="448" text-anchor="middle" class="doc">CONTRIBUTING.md</text>
    <text x="1060" y="484" text-anchor="middle" class="node-body">Avoid duplicates</text>
    <text x="1060" y="508" text-anchor="middle" class="doc">Open PRs / Issues</text>
    <text x="1060" y="544" text-anchor="middle" class="node-body">Submit focused change</text>
    <text x="1060" y="568" text-anchor="middle" class="doc">Small PR</text>
  </g>

  <!-- Outcomes -->
  <g>
    <rect x="70" y="632" width="156" height="38" rx="19" fill="#FFFFFF" stroke="#059669"/>
    <text x="148" y="656" text-anchor="middle" class="small">Conformance claim</text>
    <rect x="288" y="632" width="176" height="38" rx="19" fill="#FFFFFF" stroke="#7C3AED"/>
    <text x="376" y="656" text-anchor="middle" class="small">Governance baseline</text>
    <rect x="526" y="632" width="156" height="38" rx="19" fill="#FFFFFF" stroke="#D97706"/>
    <text x="604" y="656" text-anchor="middle" class="small">Vendor decision</text>
    <rect x="754" y="632" width="156" height="38" rx="19" fill="#FFFFFF" stroke="#E11D48"/>
    <text x="832" y="656" text-anchor="middle" class="small">Review findings</text>
    <rect x="982" y="632" width="156" height="38" rx="19" fill="#FFFFFF" stroke="#475569"/>
    <text x="1060" y="656" text-anchor="middle" class="small">Focused PR</text>
  </g>
</svg>
