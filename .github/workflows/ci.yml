name: CI Sanity Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sanity-checks:
    name: Repository sanity checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          npm install -g markdownlint-cli2 markdown-link-check

      - name: Check Python syntax
        run: |
          if [ -d "scripts" ]; then
            python -m compileall scripts
          else
            echo "No scripts directory found. Skipping Python syntax check."
          fi

      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./.git/*" -print0 | while IFS= read -r -d '' file; do
            echo "Validating $file"
            python -m json.tool "$file" > /dev/null
          done

      - name: Check Markdown structure
        run: |
          cat > .markdownlint-cli2.jsonc <<'EOF'
          {
            "config": {
              "MD013": false,
              "MD060": false
            },
            "globs": ["**/*.md", "!vendor/**", "!node_modules/**"]
          }
          EOF

          markdownlint-cli2

      - name: Check Markdown links
        run: |
          find . -name "*.md" -not -path "./.git/*" -not -path "./node_modules/*" -print0 | while IFS= read -r -d '' file; do
            echo "Checking links in $file"
            markdown-link-check "$file" --quiet
          done

      - name: Check generated artifacts are up to date
        run: |
          if [ -f "scripts/export_requirements.py" ]; then
            python scripts/export_requirements.py
            git diff --exit-code
          else
            echo "No export script found. Skipping generated artifact check."
          fi

      - name: Check for temporary or debug files
        run: |
          if find . -type f \( -name "*.tmp" -o -name "*.bak" -o -name "*.log" -o -name ".DS_Store" \) | grep .; then
            echo "Temporary/debug files found."
            exit 1
          fi

          echo "No temporary/debug files found."